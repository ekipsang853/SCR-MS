<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <nav class="topbar">
        <a class="brand" href="/">
            <span class="brand-mark">SC</span>
            <span class="brand-text">
                <span>Student System</span>
                <small>Admin Workspace</small>
            </span>
        </a>
        <div class="nav-actions">
            <a href="/students" class="nav-link is-active">Students</a>
            <a href="/courses" class="nav-link">Courses</a>
            <a href="/registrations" class="nav-link">Registrations</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div>
                <p class="pill">Student Account</p>
                <h1 th:text="${student.id != null ? 'Edit student profile' : 'Create a new student account'}"></h1>
                <p>Keep academic details and portal login credentials together in one clean record.</p>
            </div>
        </section>

        <section class="glass-panel">
            <div class="panel-body">
                <form th:action="@{/students/save}" th:object="${student}" method="post" class="form-layout">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-grid">
                        <div class="field">
                            <label for="name">Name</label>
                            <input id="name" type="text" th:field="*{name}" required>
                        </div>

                        <div class="field">
                            <label for="email">Email</label>
                            <input id="email" type="email" th:field="*{email}" required>
                            <p class="field-help">Students will use this email address to log in.</p>
                        </div>

                        <div class="field">
                            <label for="password">Password</label>
                            <input id="password" type="password" th:field="*{password}"
                                   th:placeholder="${student.id != null ? 'Leave blank to keep existing password' : 'Create a password'}">
                            <p class="field-help"
                               th:text="${student.id != null ? 'Leave blank to keep the current password.' : 'Set the initial password for the student account.'}"></p>
                        </div>

                        <div class="field">
                            <label for="program">Program</label>
                            <input id="program" type="text" th:field="*{program}">
                        </div>

                        <div class="field">
                            <label for="year">Year</label>
                            <input id="year" type="number" th:field="*{year}">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Student</button>
                        <a href="/students" class="btn btn-secondary">Back to Students</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
