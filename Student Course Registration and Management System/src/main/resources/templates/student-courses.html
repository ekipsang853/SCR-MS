<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Registered Courses</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <nav class="topbar">
        <a class="brand" href="/student/dashboard">
            <span class="brand-mark">SP</span>
            <span class="brand-text">
                <span>Student Portal</span>
                <small>Personal Workspace</small>
            </span>
        </a>
        <div class="nav-actions">
            <a href="/student/dashboard" class="nav-link">Dashboard</a>
            <a href="/student/courses" class="nav-link is-active">My Courses</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-light">Logout</button>
            </form>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div>
                <p class="pill">Registered Courses</p>
                <h1>My courses</h1>
                <p th:text="'A current view of the courses registered to ' + ${student.name}"></p>
            </div>
        </section>

        <section class="glass-panel">
            <div class="panel-body">
                <div th:if="${#lists.isEmpty(registrations)}" class="empty-state">You have not registered for any courses yet.</div>
                <div th:if="${!#lists.isEmpty(registrations)}" class="table-shell">
                    <table>
                        <thead>
                        <tr>
                            <th>Course Code</th>
                            <th>Course Name</th>
                            <th>Lecturer</th>
                            <th>Credits</th>
                            <th>Semester</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="registration : ${registrations}">
                            <td><span class="pill" th:text="${registration.course.courseCode}"></span></td>
                            <td><strong th:text="${registration.course.courseName}"></strong></td>
                            <td th:text="${registration.course.lecturer} ?: 'Not assigned'"></td>
                            <td th:text="${registration.course.credits} ?: 'Not set'"></td>
                            <td th:text="${registration.semester}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
